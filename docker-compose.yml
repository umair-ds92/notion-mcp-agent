services:
  notion-mcp-agent:
    build: .
    container_name: notion-mcp-agent
    ports:
      - "${PORT:-7001}:${PORT:-7001}"
    env_file:
      - .env
    environment:
      - PORT=${PORT:-7001}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-7001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s